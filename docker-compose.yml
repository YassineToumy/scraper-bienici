services:
  bienici:
    build: .
    container_name: scraper-bienici
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - MONGO_BIENICI_DB=${MONGO_BIENICI_DB:-bienici}
      - MONGO_BIENICI_COL_RAW=${MONGO_BIENICI_COL_RAW:-locations}
      - MONGO_BIENICI_COL_CLEAN=${MONGO_BIENICI_COL_CLEAN:-locations_clean}
      - POSTGRES_DSN=${POSTGRES_DSN}
      - PG_TABLE_BIENICI=${PG_TABLE_BIENICI:-bienici_listings}
      - PG_ARCHIVE_BIENICI=${PG_ARCHIVE_BIENICI:-bienici_archive}
      - BATCH_SIZE=${BATCH_SIZE:-500}
      - CYCLE_SLEEP=${CYCLE_SLEEP:-86400}
      - B2_KEY_ID=${B2_KEY_ID}
      - B2_APPLICATION_KEY=${B2_APPLICATION_KEY}
      - B2_ENDPOINT=${B2_ENDPOINT:-https://s3.us-east-005.backblazeb2.com}
      - B2_BUCKET=${B2_BUCKET:-immo-world}
    volumes:
      - ./logs:/app/logs
